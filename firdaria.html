<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firdaria — ペルシャのタイムロードシステム</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0e14;--surface:#13141c;--surface2:#1a1b26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.16);
  --text:#e8e4dc;--text-mid:rgba(232,228,220,0.72);--text-dim:rgba(232,228,220,0.45);
  --sun:#c97a5a;--moon:#7ab3c8;--mercury:#6ba88a;--venus:#c47a95;
  --mars:#c46a4a;--jupiter:#c8aa55;--saturn:#4a6a9a;--north:#8a6aaa;--south:#a89070;
}
.light-mode{
  --bg:#f0eeea;--surface:#ffffff;--surface2:#e8e6e2;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.26);
  --text:#111122;--text-mid:#3a3a5c;--text-dim:#7a7a9a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.18) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 68%,rgba(255,255,255,.11) 0%,transparent 100%),
  radial-gradient(1px 1px at 48% 28%,rgba(255,255,255,.15) 0%,transparent 100%),
  radial-gradient(1px 1px at 67% 78%,rgba(255,255,255,.09) 0%,transparent 100%),
  radial-gradient(1px 1px at 83% 42%,rgba(255,255,255,.13) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 35% 53%,rgba(255,255,255,.07) 0%,transparent 100%),
  radial-gradient(1px 1px at 58% 8%,rgba(255,255,255,.10) 0%,transparent 100%),
  radial-gradient(1px 1px at 91% 20%,rgba(255,255,255,.08) 0%,transparent 100%);
  pointer-events:none;z-index:0;transition:opacity .3s}
body.light-mode::before{opacity:0}
.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:50px 24px 100px}

.light-mode .cur-dates,.light-mode .tl-dbig{color:#111122;font-weight:500}
.light-mode .cur-planet{font-weight:500}
.light-mode .tl-name{font-weight:600}
.light-mode .cd-remain{font-weight:700}
.light-mode .tl-age,.light-mode .cur-age{color:#3a3a5c}

/* theme */
.theme-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:20px}
.theme-row span{font-size:11px;color:var(--text-dim);letter-spacing:.08em}
.th-r{display:none}
.th-l{font-size:12px;padding:4px 14px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text-mid);transition:all .18s;user-select:none}
.th-r:checked+.th-l{background:var(--surface2);color:var(--text);font-weight:500}

/* header */
header{text-align:center;margin-bottom:44px}
.title-en{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,7vw,4.2rem);font-weight:300;letter-spacing:.14em;line-height:1}
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:14px auto}
.title-sub{font-size:.78rem;letter-spacing:.2em;color:var(--text-dim)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:18px}
@media(max-width:520px){.card{padding:22px 16px}}

/* input */
.input-section{text-align:center}
.p-italic{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--text-mid);margin-bottom:5px}
.p-main{font-size:.95rem;color:var(--text-mid);margin-bottom:22px}
.date-sel-row{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.date-sel-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.date-sel-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.08em}
.date-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Serif JP',serif;font-size:15px;padding:9px 8px;outline:none;cursor:pointer;text-align:center;-webkit-appearance:none;appearance:none;min-width:72px;width:auto}
.date-sel-year{min-width:96px}
.time-row{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:6px}
.time-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Serif JP',serif;font-size:14px;padding:8px 12px;outline:none;width:120px;text-align:center}
.input-hint{font-size:.7rem;color:var(--text-dim);margin-bottom:20px}
.sect-row{display:flex;gap:12px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.sect-btn{display:flex;align-items:center;gap:7px;border-radius:10px;cursor:pointer;font-size:15px;padding:11px 24px;letter-spacing:.04em;transition:all .25s;border-width:1.5px;border-style:solid;font-family:'Cormorant Garamond',serif}
.btn-day{color:#c8aa55;border-color:#c8aa55;background:rgba(200,170,85,.07);box-shadow:0 0 10px rgba(200,170,85,.20),0 0 24px rgba(200,170,85,.10)}
.btn-day:hover{background:rgba(200,170,85,.14)}
.btn-day.sel{color:#1a1400;background:#c8aa55;border-color:#c8aa55;box-shadow:0 0 22px rgba(200,170,85,.65),0 0 46px rgba(200,170,85,.30)}
.btn-night{color:#7ab3c8;border-color:#7ab3c8;background:rgba(122,179,200,.07);box-shadow:0 0 10px rgba(122,179,200,.20),0 0 24px rgba(122,179,200,.10)}
.btn-night:hover{background:rgba(122,179,200,.14)}
.btn-night.sel{color:#0a1a20;background:#7ab3c8;border-color:#7ab3c8;box-shadow:0 0 22px rgba(122,179,200,.65),0 0 46px rgba(122,179,200,.30)}
.variant-row{display:flex;justify-content:center;margin-bottom:22px}
.variant-toggle{display:flex;border:0.5px solid var(--border2);border-radius:20px;overflow:hidden}
.var-r{display:none}
.var-l{font-size:11px;padding:5px 16px;cursor:pointer;color:var(--text-dim);transition:all .18s;user-select:none;letter-spacing:.04em}
.var-r:checked+.var-l{background:var(--border2);color:var(--text)}
.variant-note{font-size:.65rem;color:var(--text-dim);margin-top:5px;text-align:center;line-height:1.5}
.go-btn{background:transparent;border:1px solid var(--border2);border-radius:9px;color:var(--text-mid);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:.08em;padding:10px 32px;transition:all .2s}
.go-btn:hover{color:var(--text);border-color:var(--text)}
.err{color:#c97a7a;font-size:.82rem;margin-top:10px}

/* result header — all centered */
#result{display:none}
.result-header{text-align:center;margin-bottom:20px}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.75rem;padding:7px 18px;transition:all .18s;display:inline-block;margin-bottom:10px}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.r-info{font-size:.85rem;color:var(--text-mid);margin-bottom:10px}
.variant-switch-wrap{margin-top:4px;min-height:24px}
.variant-switch-btn{display:inline-flex;align-items:center;gap:6px;border-radius:20px;cursor:pointer;font-size:.75rem;padding:6px 20px;transition:all .25s;border-width:1px;border-style:solid;font-family:'Noto Serif JP',serif;letter-spacing:.04em}
.variant-switch-btn.is-std{color:var(--text-mid);border-color:var(--border2);background:transparent}
.variant-switch-btn.is-std:hover{color:var(--text);border-color:var(--text)}
.variant-switch-btn.is-var{color:#c97a7a;border-color:#c97a7a;background:rgba(201,122,122,.08);box-shadow:0 0 10px rgba(201,122,122,.18)}
.variant-switch-btn.is-var:hover{background:rgba(201,122,122,.16)}
.variant-active-label{font-size:.68rem;color:#c97a7a;margin-top:5px;letter-spacing:.06em}

.sec-lbl{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.two-col{grid-template-columns:1fr}}
.cur-card{border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:border-color .3s}
.cur-tag{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.cur-planet{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:5px;transition:color .3s}
.cur-dates{font-size:.88rem;color:var(--text);margin-bottom:3px}
.cur-age{font-size:.76rem;color:var(--text-mid);margin-bottom:11px}
.pbar-bg{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:6px}
.pbar{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.16,1,.3,1),background .3s}
.pbar-row{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-dim);margin-bottom:10px}
.cd-inline{font-size:.8rem;color:var(--text-mid);padding-top:9px;border-top:1px solid var(--border);line-height:1.9}
.cd-remain{font-weight:500;color:var(--text)}
.cd-next{color:var(--text-dim);font-size:.72rem}
.no-sub{font-size:.78rem;color:var(--text-dim);font-style:italic;text-align:center;padding:12px 0}
.search-head{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.search-title{font-size:.82rem;color:var(--text)}
.search-hint-txt{font-size:.7rem;color:var(--text-dim)}
.search-inline{display:flex;flex-direction:row;gap:8px;align-items:center;flex-wrap:nowrap}
.search-inline .date-sel{width:auto;min-width:0;flex-shrink:1}
.ssel-year{width:90px}.ssel-month{width:68px}.ssel-day{width:68px}
.search-btn{padding:8px 14px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text-mid);cursor:pointer;font-size:.78rem;white-space:nowrap;transition:all .18s;font-family:'Noto Serif JP',serif;flex-shrink:0}
.search-btn:hover{color:var(--text)}
@media(max-width:420px){.search-inline{flex-wrap:wrap}}
.search-result{font-size:.82rem;color:var(--text-mid);padding:12px 16px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);margin-top:10px;display:none;line-height:1.9}
.sr-row{display:flex;align-items:baseline;flex-wrap:wrap}
.sr-pre{font-size:.72rem;color:var(--text-dim);white-space:nowrap;display:inline-block;width:68px}
.tl-item{padding:13px 16px;border-radius:12px;border:1px solid transparent;margin-bottom:5px;cursor:pointer;transition:background .12s;user-select:none}
.tl-item:hover{background:var(--surface2)}
.tl-item.act,.tl-item.open{background:var(--surface2);border-color:var(--border2)}
.tl-header{display:flex;align-items:center;gap:10px}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--ic);flex-shrink:0;opacity:.7}
.tl-item.act .tl-dot,.tl-item.open .tl-dot{opacity:1}
.tl-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;flex:0 0 130px;white-space:nowrap}
.tl-mid{flex:1;padding:0 10px;min-width:80px}
.tl-dbig{font-size:.88rem;color:var(--text);line-height:1.5}
.tl-age{font-size:.72rem;color:var(--text-mid)}
.tl-chev{font-size:.65rem;color:var(--text-dim);flex-shrink:0;margin-left:auto}
@media(max-width:480px){.tl-name{flex:0 0 110px}}
.tl-sub{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.tl-item.open .tl-sub{display:block}
.tl-sub-lbl{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:9px}
.sub-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
@media(max-width:540px){.sub-grid{grid-template-columns:repeat(4,1fr)}}
.sub-cell{border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.sub-pname{font-family:'Cormorant Garamond',serif;font-size:.92rem;display:block;margin-bottom:3px}
.sub-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px}
.sub-y{font-size:.7rem;display:block;margin-bottom:1px}
.sub-cell.act .sub-md{font-size:.7rem;display:block;line-height:1.3;font-weight:500}
.sub-cell:not(.act) .sub-md{font-size:.6rem;color:var(--text-dim);display:block;line-height:1.3}
.sub-arrow{font-size:.58rem;color:var(--text-dim);display:block;margin:2px 0}
</style>
</head>
<body id="body">
<div class="container">

  <div class="theme-row">
    <span>テーマ</span>
    <input class="th-r" type="radio" name="th" id="th-d" checked onchange="setTheme('dark')">
    <label class="th-l" for="th-d">ダーク</label>
    <input class="th-r" type="radio" name="th" id="th-l" onchange="setTheme('light')">
    <label class="th-l" for="th-l">ライト</label>
  </div>

  <header>
    <div class="title-en">Firdaria</div>
    <div class="divider"></div>
    <div class="title-sub">〜 ペルシャのタイムロードシステム 〜</div>
  </header>

  <div class="card" id="input-screen">
    <div class="input-section">
      <p class="p-italic">あなたの誕生日を入力し、</p>
      <p class="p-main">昼生まれか夜生まれかを選択してください</p>
      <div class="date-sel-row">
        <div class="date-sel-wrap"><span class="date-sel-lbl">年</span><select class="date-sel date-sel-year" id="sel-y"></select></div>
        <div class="date-sel-wrap"><span class="date-sel-lbl">月</span><select class="date-sel" id="sel-m"></select></div>
        <div class="date-sel-wrap"><span class="date-sel-lbl">日</span><select class="date-sel" id="sel-d"></select></div>
      </div>
      <div class="time-row">
        <div class="date-sel-wrap">
          <span class="date-sel-lbl">出生時刻（任意）</span>
          <input class="time-input" type="time" id="sel-time"/>
        </div>
      </div>
      <p class="input-hint">時刻不明の場合は空欄のままで計算できます</p>
      <div class="sect-row">
        <button class="sect-btn btn-day" id="btn-day" onclick="selSect('day')">☀ 昼生まれ</button>
        <button class="sect-btn btn-night" id="btn-night" onclick="selSect('night')">☽ 夜生まれ</button>
      </div>
      <div class="variant-row">
        <div>
          <div class="variant-toggle">
            <input class="var-r" type="radio" name="var" id="var-std" checked>
            <label class="var-l" for="var-std">Standard（ノード最後）</label>
            <input class="var-r" type="radio" name="var" id="var-alt">
            <label class="var-l" for="var-alt">Variant（夜生まれのノード位置変更）</label>
          </div>
          <div class="variant-note">Variant：夜生まれの順序を 月→土星→木星→火星→NN→SN→太陽→金星→水星 に変更</div>
        </div>
      </div>
      <button class="go-btn" onclick="calc()">現在のフィルダリアへ</button>
      <div id="err" class="err"></div>
    </div>
  </div>

  <div id="result">
    <!-- centered result header -->
    <div class="result-header">
      <div><button class="back-btn" onclick="goBack()">← 入力画面に戻る</button></div>
      <div class="r-info" id="r-info"></div>
      <div class="variant-switch-wrap" id="variant-switch-wrap" style="display:none">
        <button class="variant-switch-btn is-std" id="variant-switch-btn" onclick="toggleVariant()">Standard → Zoller Variant</button>
        <div class="variant-active-label" id="variant-active-label" style="display:none">⚠ Zoller Variant 適用中</div>
      </div>
    </div>

    <div class="card">
      <div class="sec-lbl">現在のピリオド</div>
      <div class="two-col">
        <div class="cur-card" id="maj-card">
          <div class="cur-tag">メジャーピリオド</div>
          <div class="cur-planet" id="maj-name"></div>
          <div class="cur-dates" id="maj-range"></div>
          <div class="cur-age"  id="maj-age"></div>
          <div class="pbar-bg"><div class="pbar" id="maj-bar"></div></div>
          <div class="pbar-row"><span id="maj-s"></span><span id="maj-pct"></span><span id="maj-e"></span></div>
          <div class="cd-inline">残り <span class="cd-remain" id="cd-mr"></span><br><span id="cd-me"></span><br><span class="cd-next" id="cd-mn"></span></div>
        </div>
        <div class="cur-card" id="sub-card">
          <div class="cur-tag">サブピリオド</div>
          <div id="sub-content"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="search-head">
        <span class="search-title">任意の期間のフィルダリアを調べる</span>
        <span class="search-hint-txt">年・月・日を選択</span>
      </div>
      <div class="search-inline">
        <select class="date-sel ssel-year" id="ssel-y"></select>
        <select class="date-sel ssel-month" id="ssel-m"></select>
        <select class="date-sel ssel-day" id="ssel-d"></select>
        <button class="search-btn" onclick="doSearch()">この期間のフィルダリアへ</button>
      </div>
      <div id="sresult" class="search-result"></div>
    </div>

    <div class="card">
      <div class="sec-lbl">全メジャーピリオド <span style="letter-spacing:.02em;text-transform:none;font-size:.62rem;opacity:.6">— クリックでサブ展開</span></div>
      <div id="tl"></div>
    </div>

    <div style="text-align:center;margin-top:14px">
      <button class="back-btn" onclick="goBack()">← 入力画面に戻る</button>
    </div>
  </div>
</div>

<script>
const PC={sun:{name:'太陽',years:10,color:'var(--sun)'},venus:{name:'金星',years:8,color:'var(--venus)'},mercury:{name:'水星',years:13,color:'var(--mercury)'},moon:{name:'月',years:9,color:'var(--moon)'},saturn:{name:'土星',years:11,color:'var(--saturn)'},jupiter:{name:'木星',years:12,color:'var(--jupiter)'},mars:{name:'火星',years:7,color:'var(--mars)'},north:{name:'ノースノード',years:3,color:'var(--north)'},south:{name:'サウスノード',years:2,color:'var(--south)'}};
const COLORS={sun:'#c97a5a',venus:'#c47a95',mercury:'#6ba88a',moon:'#7ab3c8',saturn:'#4a6a9a',jupiter:'#c8aa55',mars:'#c46a4a',north:'#8a6aaa',south:'#a89070'};
const DAY_STD  =['sun','venus','mercury','moon','saturn','jupiter','mars','north','south'];
const NIGHT_STD=['moon','saturn','jupiter','mars','sun','venus','mercury','north','south'];
const NIGHT_VAR=['moon','saturn','jupiter','mars','north','south','sun','venus','mercury'];
const CHAL=['saturn','jupiter','mars','sun','venus','mercury','moon'];
const NODES=['north','south'];
let sect=null,birth=null,periods=[],curMaj=-1,isVariant=false;

function setTheme(t){document.getElementById('body').className=t==='light'?'light-mode':''}
function isNode(k){return NODES.includes(k)}
function addYears(d,y){const r=new Date(d);r.setFullYear(r.getFullYear()+y);return r}
function getOrder(v){if(sect==='day')return DAY_STD;return v?NIGHT_VAR:NIGHT_STD}

function initSelects(){
  const curY=new Date().getFullYear();
  ['sel-y','ssel-y'].forEach(id=>{const el=document.getElementById(id);for(let y=curY;y>=1920;y--){const o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===1980)o.selected=true;el.appendChild(o)}});
  ['sel-m','ssel-m'].forEach(id=>{const el=document.getElementById(id);for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';if(m===1)o.selected=true;el.appendChild(o)}});
  updateDays('sel-y','sel-m','sel-d',1);updateDays('ssel-y','ssel-m','ssel-d',1);
  document.getElementById('sel-y').addEventListener('change',()=>updateDays('sel-y','sel-m','sel-d'));
  document.getElementById('sel-m').addEventListener('change',()=>updateDays('sel-y','sel-m','sel-d'));
  document.getElementById('ssel-y').addEventListener('change',()=>updateDays('ssel-y','ssel-m','ssel-d'));
  document.getElementById('ssel-m').addEventListener('change',()=>updateDays('ssel-y','ssel-m','ssel-d'));
}
function updateDays(yId,mId,dId,defDay){
  const y=+document.getElementById(yId).value,m=+document.getElementById(mId).value;
  const days=new Date(y,m,0).getDate();
  const dEl=document.getElementById(dId);const cur=+dEl.value||defDay||1;dEl.innerHTML='';
  for(let d=1;d<=days;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'日';if(d===(cur<=days?cur:1))o.selected=true;dEl.appendChild(o)}
}
function getDate(yId,mId,dId,timeId){
  const y=+document.getElementById(yId).value,m=+document.getElementById(mId).value-1,d=+document.getElementById(dId).value;
  let h=0,mn=0;
  if(timeId){const tv=document.getElementById(timeId).value;if(tv){const[th,tm]=tv.split(':');h=+th;mn=+tm}}
  return new Date(y,m,d,h,mn,0);
}
function selSect(s){sect=s;document.getElementById('btn-day').className='sect-btn btn-day'+(s==='day'?' sel':'');document.getElementById('btn-night').className='sect-btn btn-night'+(s==='night'?' sel':'')}
function fmt(d){return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())}
function fmtDT(d){const h=d.getHours(),m=d.getMinutes();return fmt(d)+(h===0&&m===0?'':' '+pad(h)+':'+pad(m))}
function fmtP(d){return{y:d.getFullYear(),m:pad(d.getMonth()+1),d:pad(d.getDate())}}
function pad(n){return String(n).padStart(2,'0')}
function age(b,d){let a=d.getFullYear()-b.getFullYear();if(d.getMonth()<b.getMonth()||(d.getMonth()===b.getMonth()&&d.getDate()<b.getDate()))a--;return a}
function ageMonths(b,d){let y=d.getFullYear()-b.getFullYear(),m=d.getMonth()-b.getMonth();if(d.getDate()<b.getDate())m--;if(m<0){y--;m+=12}return y+'歳'+m+'ヶ月'}
function remFull(from,to){
  let y=to.getFullYear()-from.getFullYear(),mo=to.getMonth()-from.getMonth(),d=to.getDate()-from.getDate(),h=to.getHours()-from.getHours();
  if(h<0){d--;h+=24}if(d<0){mo--;d+=new Date(to.getFullYear(),to.getMonth(),0).getDate()}if(mo<0){y--;mo+=12}
  const p=[];if(y>0)p.push(y+'年');if(mo>0)p.push(mo+'ヶ月');if(d>0)p.push(d+'日');if(h>0)p.push(h+'時間');
  return p.length?p.join(' '):'まもなく終了';
}
function mkSubs(maj){
  if(isNode(maj.key))return null;
  const k=maj.key,tot=maj.end-maj.start,ch=tot/7;let si=CHAL.indexOf(k);if(si<0)si=0;
  return Array.from({length:7},(_,i)=>{const idx=(si+i)%7,ck=CHAL[idx];return{key:ck,start:new Date(maj.start.getTime()+ch*i),end:new Date(maj.start.getTime()+ch*(i+1))}});
}
function buildPeriods(v){
  const order=getOrder(v),ps=[];let cur=new Date(birth);
  for(const k of order){const s=new Date(cur),e=addYears(cur,PC[k].years);ps.push({key:k,start:s,end:e});cur=new Date(e)}
  return ps;
}
function updateVariantUI(){
  const btn=document.getElementById('variant-switch-btn'),lbl=document.getElementById('variant-active-label');
  if(isVariant){
    btn.className='variant-switch-btn is-var';
    btn.textContent='Zoller Variant → Standard に戻す';
    lbl.style.display='block';
  } else {
    btn.className='variant-switch-btn is-std';
    btn.textContent='Standard → Zoller Variant';
    lbl.style.display='none';
  }
}
function toggleVariant(){
  isVariant=!isVariant;
  periods=buildPeriods(isVariant);
  const now=new Date();
  curMaj=periods.findIndex(p=>now>=p.start&&now<p.end);
  if(curMaj<0)return;
  const maj=periods[curMaj],sb=mkSubs(maj),si=sb?sb.findIndex(s=>now>=s.start&&now<s.end):-1;
  updateVariantUI();
  rMaj(maj,now);rSubCard(sb,si,now);rTl(now);
  document.getElementById('sresult').style.display='none';
}

function calc(){
  const err=document.getElementById('err');err.textContent='';
  birth=getDate('sel-y','sel-m','sel-d','sel-time');
  if(!sect){err.textContent='昼生まれ / 夜生まれを選択してください';return}
  isVariant=document.getElementById('var-alt').checked;
  periods=buildPeriods(isVariant);
  const now=new Date();
  curMaj=periods.findIndex(p=>now>=p.start&&now<p.end);
  if(curMaj<0){err.textContent='現在はフィルダリアサイクルの範囲外です';return}
  const maj=periods[curMaj],sb=mkSubs(maj),si=sb?sb.findIndex(s=>now>=s.start&&now<s.end):-1;
  document.getElementById('input-screen').style.display='none';
  document.getElementById('result').style.display='block';
  const tv=document.getElementById('sel-time').value;
  document.getElementById('r-info').textContent=fmt(birth)+(tv?' '+tv:'')+'生まれ　'+(sect==='day'?'☀ 昼生まれ':'☽ 夜生まれ');
  document.getElementById('variant-switch-wrap').style.display=sect==='night'?'block':'none';
  updateVariantUI();
  rMaj(maj,now);rSubCard(sb,si,now);rTl(now);
}

function rMaj(per,now){
  const c=COLORS[per.key],pct=Math.min(100,((now-per.start)/(per.end-per.start))*100);
  document.getElementById('maj-card').style.borderColor=c;
  const n=document.getElementById('maj-name');n.textContent=PC[per.key].name+'期';n.style.color=c;
  document.getElementById('maj-range').textContent=fmtDT(per.start)+' — '+fmtDT(per.end);
  document.getElementById('maj-age').textContent=age(birth,per.start)+'歳 〜 '+age(birth,per.end)+'歳';
  const bar=document.getElementById('maj-bar');bar.style.background=c;setTimeout(()=>{bar.style.width=pct.toFixed(1)+'%'},80);
  document.getElementById('maj-s').textContent=fmt(per.start);document.getElementById('maj-pct').textContent=pct.toFixed(0)+'% 経過';document.getElementById('maj-e').textContent=fmt(per.end);
  document.getElementById('cd-mr').textContent=remFull(now,per.end);document.getElementById('cd-me').textContent=fmtDT(per.end)+'に終了';
  const ni=curMaj+1;document.getElementById('cd-mn').textContent=ni<periods.length?'next '+PC[periods[ni].key].name+'期':'';
}
function rSubCard(sb,si,now){
  const card=document.getElementById('sub-card'),content=document.getElementById('sub-content');
  if(!sb){card.style.borderColor='#8a6aaa';content.innerHTML='<div class="no-sub">サブピリオドなし</div>';return}
  if(si<0){content.innerHTML='<div class="no-sub">—</div>';return}
  const per=sb[si],c=COLORS[per.key],pct=Math.min(100,((now-per.start)/(per.end-per.start))*100);
  card.style.borderColor=c;
  content.innerHTML=`<div class="cur-planet" style="color:${c}">${PC[per.key].name}期</div><div class="cur-dates">${fmtDT(per.start)} — ${fmtDT(per.end)}</div><div class="cur-age" id="sub-age-txt"></div><div class="pbar-bg"><div class="pbar" id="sub-bar2" style="background:${c};width:0%"></div></div><div class="pbar-row"><span>${fmt(per.start)}</span><span>${pct.toFixed(0)}% 経過</span><span>${fmt(per.end)}</span></div><div class="cd-inline">残り <span class="cd-remain">${remFull(now,per.end)}</span><br>${fmtDT(per.end)}に終了<br><span class="cd-next">${si+1<sb.length?'next '+PC[sb[si+1].key].name+'期':''}</span></div>`;
  document.getElementById('sub-age-txt').textContent=ageMonths(birth,per.start)+' 〜 '+ageMonths(birth,per.end);
  setTimeout(()=>{const b=document.getElementById('sub-bar2');if(b)b.style.width=pct.toFixed(1)+'%'},80);
}
function subGrid(sb,ref){
  if(!sb)return'<div class="no-sub">サブピリオドなし</div>';
  let h='<div class="sub-grid">';
  sb.forEach(s=>{const p=PC[s.key],c=COLORS[s.key],act=ref&&ref>=s.start&&ref<s.end,ss=fmtP(s.start),se=fmtP(s.end);
    h+=`<div class="sub-cell" style="${act?'border-color:'+c+';background:'+c+'18':''}"><span class="sub-pname" style="color:${act?c:'var(--text)'}">${p.name}期</span><div class="sub-dot" style="background:${c}"></div><span class="sub-y" style="color:${act?c:'var(--text-mid)'}">${ss.y}</span><span class="sub-md" style="${act?'color:var(--text);font-weight:500':''}">${ss.m}/${ss.d}</span><span class="sub-arrow">↓</span><span class="sub-y" style="color:${act?c:'var(--text-mid)'}">${se.y}</span><span class="sub-md" style="${act?'color:var(--text);font-weight:500':''}">${se.m}/${se.d}</span></div>`;
  });return h+'</div>';
}
function rTl(now){
  const tl=document.getElementById('tl');tl.innerHTML='';
  periods.forEach((per,i)=>{
    const p=PC[per.key],c=COLORS[per.key],act=i===curMaj,node=isNode(per.key);
    const item=document.createElement('div');item.className='tl-item'+(act?' act open':'');item.dataset.idx=i;item.style.setProperty('--ic',c);
    const sb=mkSubs(per);
    const subHtml=node?`<div class="tl-sub"><div class="no-sub">サブピリオドなし</div></div>`:`<div class="tl-sub"><div class="tl-sub-lbl">${act?'現在のサブピリオド一覧':'サブピリオド一覧'}</div>${subGrid(sb,act?now:null)}</div>`;
    item.innerHTML=`<div class="tl-header"><div class="tl-dot"></div><div class="tl-name" style="color:${act?c:'var(--text)'}">${p.name}期</div><div class="tl-mid"><div class="tl-dbig">${fmt(per.start)} – ${fmt(per.end)}</div><div class="tl-age">${age(birth,per.start)}歳 〜 ${age(birth,per.end)}歳</div></div><div class="tl-chev">${node?'':act?'▲':'▼'}</div></div>${subHtml}`;
    if(!node){item.querySelector('.tl-header').addEventListener('click',()=>{const o=item.classList.contains('open');document.querySelectorAll('.tl-item').forEach(el=>{el.classList.remove('open');const ch=el.querySelector('.tl-chev');if(ch&&!isNode(periods[+el.dataset.idx].key))ch.textContent='▼'});if(!o){item.classList.add('open');item.querySelector('.tl-chev').textContent='▲'}})}
    tl.appendChild(item);
  });
}
function doSearch(){
  const el=document.getElementById('sresult'),t=getDate('ssel-y','ssel-m','ssel-d',null);
  const mi=periods.findIndex(p=>t>=p.start&&t<p.end);
  if(mi<0){el.style.display='block';el.innerHTML='<span style="color:#c97a7a">この日付はサイクルの範囲外です</span>';return}
  const maj=periods[mi],mc=COLORS[maj.key],sb=mkSubs(maj);
  const as=age(birth,maj.start),ae=age(birth,maj.end);
  let h=`<div class="sr-row"><span class="sr-pre">メジャー：</span><b style="color:${mc}">${PC[maj.key].name}期</b>&nbsp;<span style="font-size:.82rem">${fmt(maj.start)} – ${fmt(maj.end)}</span>&nbsp;<span style="font-size:.7rem;opacity:.6">${as}歳〜${ae}歳</span></div>`;
  if(sb){const si=sb.findIndex(s=>t>=s.start&&t<s.end);if(si>=0){const sc=COLORS[sb[si].key];h+=`<div class="sr-row" style="margin-top:3px"><span class="sr-pre">サブ　　：</span><b style="color:${sc}">${PC[sb[si].key].name}期</b>&nbsp;<span style="font-size:.82rem">${fmt(sb[si].start)} – ${fmt(sb[si].end)}</span></div>`}}
  else h+=`<div class="sr-row" style="margin-top:3px"><span class="sr-pre">サブ　　：</span><span style="font-style:italic;opacity:.5">サブピリオドなし</span></div>`;
  el.style.display='block';el.innerHTML=h;
  const isc=mi===curMaj;
  document.querySelectorAll('.tl-item').forEach(el=>{const idx=+el.dataset.idx;if(idx===mi){el.classList.add('open');const ch=el.querySelector('.tl-chev');if(ch&&!isNode(periods[idx].key))ch.textContent='▲';if(sb)el.querySelector('.tl-sub').innerHTML=`<div class="tl-sub-lbl">${isc?'現在のサブピリオド一覧':'サブピリオド一覧'}</div>`+subGrid(sb,t);el.scrollIntoView({behavior:'smooth',block:'nearest'})}else{el.classList.remove('open');const ch=el.querySelector('.tl-chev');if(ch&&!isNode(periods[idx].key))ch.textContent='▼'}});
}
function goBack(){document.getElementById('input-screen').style.display='block';document.getElementById('result').style.display='none';document.getElementById('sresult').style.display='none';isVariant=false}
initSelects();
</script>
