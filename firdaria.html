<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firdaria — 時の主を探る</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0e14; --surface:#13141c; --surface2:#1a1b26;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --text:#e8e4dc; --text-dim:rgba(232,228,220,0.42); --text-mid:rgba(232,228,220,0.68);
  --sun:#c97a5a; --moon:#7ab3c8; --mercury:#6ba88a; --venus:#c47a95;
  --mars:#c46a4a; --jupiter:#c8aa55; --saturn:#4a6a9a; --north:#8a6aaa; --south:#a89070;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.18) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 68%,rgba(255,255,255,.11) 0%,transparent 100%),
  radial-gradient(1px 1px at 48% 28%,rgba(255,255,255,.15) 0%,transparent 100%),
  radial-gradient(1px 1px at 67% 78%,rgba(255,255,255,.09) 0%,transparent 100%),
  radial-gradient(1px 1px at 83% 42%,rgba(255,255,255,.13) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 35% 53%,rgba(255,255,255,.07) 0%,transparent 100%),
  radial-gradient(1px 1px at 58% 8%,rgba(255,255,255,.10) 0%,transparent 100%),
  radial-gradient(1px 1px at 91% 20%,rgba(255,255,255,.08) 0%,transparent 100%);
  pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:60px 24px 100px}

header{text-align:center;margin-bottom:52px}
.title-en{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,7vw,4.2rem);font-weight:300;letter-spacing:.14em;line-height:1}
.divider{width:56px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);margin:16px auto}
.title-sub{font-size:.72rem;letter-spacing:.32em;color:var(--text-dim);text-transform:uppercase}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px 28px;margin-bottom:20px}
@media(max-width:520px){.card{padding:22px 16px}}

.input-section{text-align:center}
.prompt-italic{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--text-mid);margin-bottom:6px}
.prompt-main{font-size:1rem;color:var(--text-mid);margin-bottom:32px;font-weight:300}
.input-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.input-row input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Noto Serif JP',serif;font-size:.9rem;padding:11px 15px;outline:none;transition:border-color .2s}
.input-row input:focus{border-color:var(--border2)}
#bdate{width:168px}#btime{width:130px}
.input-note{font-size:.7rem;color:var(--text-dim);margin-bottom:24px}
.sect-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.sect-btn{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-mid);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1.05rem;padding:13px 26px;letter-spacing:.04em;transition:all .18s}
.sect-btn:hover{border-color:var(--border2);color:var(--text)}
.sect-btn.sel-day{border-color:var(--sun);color:var(--sun);background:rgba(201,122,90,.07)}
.sect-btn.sel-night{border-color:var(--moon);color:var(--moon);background:rgba(122,179,200,.07)}
.go-btn{background:transparent;border:1px solid var(--border2);border-radius:10px;color:var(--text);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em;padding:13px 42px;transition:all .22s}
.go-btn:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.3);transform:translateY(-1px)}
.err{color:#c97a7a;font-size:.82rem;margin-top:12px}

#result{display:none}
.meta-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:26px;flex-wrap:wrap;gap:8px}
.meta-label{font-size:.68rem;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase}
.meta-val{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text-mid)}
.sec-label{font-size:.68rem;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase;margin-bottom:14px}

/* current period */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:500px){.two-col{grid-template-columns:1fr}}
.cur-card{border:1px solid var(--border);border-radius:14px;padding:20px 20px 16px}
.cur-tag{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
.cur-planet{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;margin-bottom:5px}
.cur-dates{font-size:.88rem;color:var(--text);margin-bottom:3px}
.cur-age{font-size:.76rem;color:var(--text-mid);margin-bottom:12px}
.pbar-bg{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:6px}
.pbar{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.16,1,.3,1)}
.pbar-row{display:flex;justify-content:space-between;font-size:.64rem;color:var(--text-dim)}

/* countdown — after current cards */
.countdown-strip{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
@media(max-width:440px){.countdown-strip{grid-template-columns:1fr}}
.cd-card{border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.cd-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
.cd-planet{font-size:.88rem;font-weight:400;margin-bottom:5px}
.cd-remain{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;line-height:1.2;margin-bottom:4px}
.cd-remain em{font-size:.78rem;font-style:normal;color:var(--text-mid);margin-right:4px;font-family:'Noto Serif JP',serif}
.cd-until{font-size:.7rem;color:var(--text-dim)}

/* search */
.search-bar{display:flex;gap:10px;align-items:center;padding:14px 18px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);flex-wrap:wrap;margin-bottom:12px}
.search-bar label{font-size:.78rem;color:var(--text-mid);white-space:nowrap}
.search-bar input[type=date]{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Serif JP',serif;font-size:.85rem;padding:8px 12px;outline:none;transition:border-color .2s}
.search-bar input[type=date]:focus{border-color:var(--border2)}
.search-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text-mid);cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.78rem;padding:8px 18px;transition:all .18s;white-space:nowrap}
.search-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.search-result{font-size:.82rem;color:var(--text-mid);padding:12px 16px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;display:none;line-height:1.9}
.sr-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.sr-prefix{font-size:.72rem;color:var(--text-dim);letter-spacing:.05em;white-space:nowrap}

/* timeline */
.tl-item{padding:13px 16px;border-radius:12px;border:1px solid transparent;margin-bottom:5px;cursor:pointer;transition:background .12s;user-select:none}
.tl-item:hover{background:rgba(255,255,255,.02)}
.tl-item.act{background:rgba(255,255,255,.025);border-color:var(--ic)}
.tl-item.open{background:rgba(255,255,255,.025);border-color:var(--ic)}
.tl-header{display:flex;align-items:center;gap:10px}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--ic);flex-shrink:0;opacity:.75}
.tl-item.act .tl-dot,.tl-item.open .tl-dot{opacity:1}
.tl-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;flex:0 0 130px;white-space:nowrap}
.tl-mid{flex:1;padding:0 12px;min-width:130px}
.tl-dates-big{font-size:.9rem;color:var(--text);line-height:1.5}
.tl-age{font-size:.72rem;color:var(--text-mid)}
.tl-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tl-mini-bar{width:56px;height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.tl-mini-fill{height:100%;border-radius:99px}
.tl-pct{font-size:.64rem;color:var(--text-dim);min-width:26px;text-align:right}
.tl-chev{font-size:.65rem;color:var(--text-dim);flex-shrink:0}
@media(max-width:480px){.tl-mini-bar,.tl-pct{display:none}}
.tl-sub{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.tl-item.open .tl-sub{display:block}
.tl-sub-label{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.sub-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
@media(max-width:540px){.sub-grid{grid-template-columns:repeat(4,1fr)}}
.sub-cell{border:1px solid var(--border);border-radius:9px;padding:9px 4px;text-align:center}
.sub-pname{font-family:'Cormorant Garamond',serif;font-size:.95rem;display:block;margin-bottom:3px}
.sub-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 5px}
.sub-y{font-size:.72rem;display:block;margin-bottom:1px;font-weight:400}
.sub-cell.act .sub-md{font-size:.72rem;display:block;line-height:1.3}
.sub-cell:not(.act) .sub-md{font-size:.6rem;color:var(--text-dim);display:block;line-height:1.3}
.sub-arrow{font-size:.58rem;color:var(--text-dim);display:block;margin:2px 0}

.back-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.75rem;padding:8px 20px;transition:all .18s}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-en">Firdaria</div>
    <div class="divider"></div>
    <div class="title-sub">フィルダリア — 時の主を探る</div>
  </header>

  <div class="card" id="input-screen">
    <div class="input-section">
      <p class="prompt-italic">あなたの誕生日を入力し、</p>
      <p class="prompt-main">昼生まれか夜生まれかを選択してください</p>
      <div class="input-row">
        <input type="date" id="bdate"/>
        <input type="time" id="btime"/>
      </div>
      <p class="input-note">出生時刻は任意です。不明な場合は空欄のままで計算できます。</p>
      <div class="sect-row">
        <button class="sect-btn" id="btn-day" onclick="selectSect('day')">☀ 昼生まれ</button>
        <button class="sect-btn" id="btn-night" onclick="selectSect('night')">☽ 夜生まれ</button>
      </div>
      <button class="go-btn" onclick="calculate()">時の主を見る</button>
      <div id="err" class="err"></div>
    </div>
  </div>

  <div id="result">
    <div class="card">
      <div class="meta-row">
        <div><div class="meta-label">生年月日</div><div class="meta-val" id="r-birth"></div></div>
        <div style="text-align:right"><div class="meta-label">セクト</div><div class="meta-val" id="r-sect"></div></div>
      </div>

      <!-- 1. current period -->
      <div class="sec-label">現在のピリオド</div>
      <div class="two-col">
        <div class="cur-card" id="maj-card">
          <div class="cur-tag">メジャーピリオド</div>
          <div class="cur-planet" id="maj-name"></div>
          <div class="cur-dates"  id="maj-range"></div>
          <div class="cur-age"   id="maj-age"></div>
          <div class="pbar-bg"><div class="pbar" id="maj-bar"></div></div>
          <div class="pbar-row"><span id="maj-s"></span><span id="maj-pct"></span><span id="maj-e"></span></div>
        </div>
        <div class="cur-card" id="sub-card">
          <div class="cur-tag">サブピリオド</div>
          <div class="cur-planet" id="sub-name"></div>
          <div class="cur-dates"  id="sub-range"></div>
          <div class="pbar-bg" style="margin-top:12px"><div class="pbar" id="sub-bar"></div></div>
          <div class="pbar-row"><span id="sub-s"></span><span id="sub-pct"></span><span id="sub-e"></span></div>
        </div>
      </div>

      <!-- 2. countdown — directly below -->
      <div class="sec-label">次のピリオド変更まで</div>
      <div class="countdown-strip">
        <div class="cd-card" id="cd-maj">
          <div class="cd-label">メジャーピリオド終了</div>
          <div class="cd-planet" id="cd-maj-planet"></div>
          <div class="cd-remain"><em>残り</em><span id="cd-maj-remain"></span></div>
          <div class="cd-until"  id="cd-maj-end"></div>
        </div>
        <div class="cd-card" id="cd-sub">
          <div class="cd-label">サブピリオド終了</div>
          <div class="cd-planet" id="cd-sub-planet"></div>
          <div class="cd-remain"><em>残り</em><span id="cd-sub-remain"></span></div>
          <div class="cd-until"  id="cd-sub-end"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">任意の日付で検索</div>
      <div class="search-bar">
        <label>調べたい日付</label>
        <input type="date" id="search-date"/>
        <button class="search-btn" onclick="searchDate()">この日のピリオドを見る</button>
      </div>
      <div id="search-result" class="search-result"></div>
    </div>

    <div class="card">
      <div class="sec-label">全メジャーピリオド <span style="letter-spacing:.02em;text-transform:none;font-size:.65rem;opacity:.6">— クリックでサブピリオドを展開</span></div>
      <div id="tl"></div>
    </div>

    <div style="text-align:center;margin-top:14px">
      <button class="back-btn" onclick="reset()">← 最初に戻る</button>
    </div>
  </div>
</div>

<script>
const PC={
  sun:    {name:'太陽',        years:10,color:'var(--sun)'},
  venus:  {name:'金星',        years:8, color:'var(--venus)'},
  mercury:{name:'水星',        years:13,color:'var(--mercury)'},
  moon:   {name:'月',          years:9, color:'var(--moon)'},
  saturn: {name:'土星',        years:11,color:'var(--saturn)'},
  jupiter:{name:'木星',        years:12,color:'var(--jupiter)'},
  mars:   {name:'火星',        years:7, color:'var(--mars)'},
  north:  {name:'ノースノード',years:3, color:'var(--north)'},
  south:  {name:'サウスノード',years:2, color:'var(--south)'}
};
const COLORS={sun:'#c97a5a',venus:'#c47a95',mercury:'#6ba88a',moon:'#7ab3c8',saturn:'#4a6a9a',jupiter:'#c8aa55',mars:'#c46a4a',north:'#8a6aaa',south:'#a89070'};
const DAY=['sun','venus','mercury','moon','saturn','jupiter','mars','north','south'];
const NIGHT=['moon','saturn','jupiter','mars','sun','venus','mercury','north','south'];
const CHAL=['saturn','jupiter','mars','sun','venus','mercury','moon'];
let sect=null,birthDate=null,allPeriods=[],currentMajIdx=-1;

function selectSect(s){
  sect=s;
  document.getElementById('btn-day').className='sect-btn'+(s==='day'?' sel-day':'');
  document.getElementById('btn-night').className='sect-btn'+(s==='night'?' sel-night':'');
}
function addMs(d,y){return new Date(d.getTime()+y*365.25*864e5)}
function fmt(d){return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())}
function fmtP(d){return{y:d.getFullYear(),m:pad(d.getMonth()+1),d:pad(d.getDate())}}
function pad(n){return String(n).padStart(2,'0')}
function ageAt(birth,d){
  let a=d.getFullYear()-birth.getFullYear();
  if(d.getMonth()<birth.getMonth()||(d.getMonth()===birth.getMonth()&&d.getDate()<birth.getDate()))a--;
  return a;
}
function buildSubs(major){
  const k=major.key,total=major.end-major.start,chunk=total/7;
  let si=CHAL.indexOf(k);if(si<0)si=0;
  return Array.from({length:7},(_,i)=>{
    const idx=(si+i)%7,ck=CHAL[idx];
    return{key:ck,start:new Date(major.start.getTime()+chunk*i),end:new Date(major.start.getTime()+chunk*(i+1))};
  });
}
function diffYMD(from,to){
  let y=to.getFullYear()-from.getFullYear(),m=to.getMonth()-from.getMonth(),d=to.getDate()-from.getDate();
  if(d<0){m--;const prev=new Date(to.getFullYear(),to.getMonth(),0);d+=prev.getDate()}
  if(m<0){y--;m+=12}
  return{y,m,d}
}
function fmtRemain(from,to){
  const r=diffYMD(from,to);
  const parts=[];
  if(r.y>0)parts.push(r.y+'年');
  if(r.m>0)parts.push(r.m+'ヶ月');
  parts.push(r.d+'日間');
  return parts.join(' ');
}

function calculate(){
  const err=document.getElementById('err');err.textContent='';
  const dv=document.getElementById('bdate').value;
  if(!dv){err.textContent='生年月日を入力してください';return}
  if(!sect){err.textContent='昼生まれ / 夜生まれを選択してください';return}
  birthDate=new Date(dv+'T00:00:00');
  const order=sect==='day'?DAY:NIGHT;
  allPeriods=[];let cur=new Date(birthDate);
  for(const k of order){const s=new Date(cur),e=addMs(cur,PC[k].years);allPeriods.push({key:k,start:s,end:e});cur=new Date(e)}
  const now=new Date();
  currentMajIdx=allPeriods.findIndex(p=>now>=p.start&&now<p.end);
  if(currentMajIdx<0){err.textContent='現在はフィルダリアサイクルの範囲外です';return}
  const major=allPeriods[currentMajIdx];
  const subs=buildSubs(major);
  const si=subs.findIndex(s=>now>=s.start&&now<s.end);
  document.getElementById('input-screen').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('r-birth').textContent=fmt(birthDate);
  document.getElementById('r-sect').textContent=sect==='day'?'☀ 昼生まれ':'☽ 夜生まれ';
  document.getElementById('search-date').value=now.toISOString().slice(0,10);
  renderCurMaj(major,now);
  if(si>=0)renderCurSub(subs[si],now);
  renderCountdown(major,subs,si,now);
  renderTl(now);
}

function renderCurMaj(per,now){
  const c=COLORS[per.key],pct=Math.min(100,((now-per.start)/(per.end-per.start))*100);
  document.getElementById('maj-card').style.borderColor=c;
  const n=document.getElementById('maj-name');n.textContent=PC[per.key].name+'期';n.style.color=c;
  document.getElementById('maj-range').textContent=fmt(per.start)+' — '+fmt(per.end);
  document.getElementById('maj-age').textContent=ageAt(birthDate,per.start)+'歳 〜 '+ageAt(birthDate,per.end)+'歳';
  const bar=document.getElementById('maj-bar');bar.style.background=c;
  setTimeout(()=>{bar.style.width=pct.toFixed(1)+'%'},80);
  document.getElementById('maj-s').textContent=fmt(per.start);
  document.getElementById('maj-pct').textContent=pct.toFixed(0)+'% 経過';
  document.getElementById('maj-e').textContent=fmt(per.end);
}
function renderCurSub(per,now){
  const c=COLORS[per.key],pct=Math.min(100,((now-per.start)/(per.end-per.start))*100);
  document.getElementById('sub-card').style.borderColor=c;
  const n=document.getElementById('sub-name');n.textContent=PC[per.key].name+'期';n.style.color=c;
  document.getElementById('sub-range').textContent=fmt(per.start)+' — '+fmt(per.end);
  const bar=document.getElementById('sub-bar');bar.style.background=c;
  setTimeout(()=>{bar.style.width=pct.toFixed(1)+'%'},80);
  document.getElementById('sub-s').textContent=fmt(per.start);
  document.getElementById('sub-pct').textContent=pct.toFixed(0)+'% 経過';
  document.getElementById('sub-e').textContent=fmt(per.end);
}
function renderCountdown(major,subs,si,now){
  const mc=COLORS[major.key];
  document.getElementById('cd-maj').style.borderColor=mc;
  const mp=document.getElementById('cd-maj-planet');mp.textContent=PC[major.key].name+'期';mp.style.color=mc;
  document.getElementById('cd-maj-remain').textContent=fmtRemain(now,major.end);
  document.getElementById('cd-maj-end').textContent=fmt(major.end)+'に終了';
  if(si>=0){
    const sc=COLORS[subs[si].key];
    document.getElementById('cd-sub').style.borderColor=sc;
    const sp=document.getElementById('cd-sub-planet');sp.textContent=PC[subs[si].key].name+'期';sp.style.color=sc;
    document.getElementById('cd-sub-remain').textContent=fmtRemain(now,subs[si].end);
    document.getElementById('cd-sub-end').textContent=fmt(subs[si].end)+'に終了';
  }
}

function buildSubGrid(subs,refDate){
  let html='<div class="sub-grid">';
  subs.forEach(s=>{
    const p=PC[s.key],c=COLORS[s.key];
    const act=refDate&&refDate>=s.start&&refDate<s.end;
    const ss=fmtP(s.start),se=fmtP(s.end);
    html+=`<div class="sub-cell" style="${act?'border-color:'+c+';background:'+c+'18':''}">
      <span class="sub-pname" style="color:${act?c:'var(--text)'}">${p.name}期</span>
      <div class="sub-dot" style="background:${c}"></div>
      <span class="sub-y" style="color:${act?c:'var(--text-mid)'}">${ss.y}</span>
      <span class="sub-md" style="${act?'color:var(--text)':''}">${ss.m}/${ss.d}</span>
      <span class="sub-arrow">↓</span>
      <span class="sub-y" style="color:${act?c:'var(--text-mid)'}">${se.y}</span>
      <span class="sub-md" style="${act?'color:var(--text)':''}">${se.m}/${se.d}</span>
    </div>`;
  });
  return html+'</div>';
}

function renderTl(now){
  const tl=document.getElementById('tl');tl.innerHTML='';
  allPeriods.forEach((per,i)=>{
    const p=PC[per.key],c=COLORS[per.key],act=i===currentMajIdx;
    const pct=act?Math.min(100,((now-per.start)/(per.end-per.start))*100):0;
    const ageS=ageAt(birthDate,per.start),ageE=ageAt(birthDate,per.end);
    const item=document.createElement('div');
    item.className='tl-item'+(act?' act open':'');
    item.dataset.idx=i;
    item.style.setProperty('--ic',c);
    const subs=buildSubs(per);
    item.innerHTML=`
      <div class="tl-header">
        <div class="tl-dot"></div>
        <div class="tl-name" style="color:${act?c:'var(--text)'}">${p.name}期</div>
        <div class="tl-mid">
          <div class="tl-dates-big">${fmt(per.start)} – ${fmt(per.end)}</div>
          <div class="tl-age">${ageS}歳 〜 ${ageE}歳</div>
        </div>
        <div class="tl-right">
          <div class="tl-mini-bar"><div class="tl-mini-fill" style="width:${pct.toFixed(0)}%;background:${c}"></div></div>
          <div class="tl-pct">${act?pct.toFixed(0)+'%':''}</div>
          <div class="tl-chev">${act?'▲':'▼'}</div>
        </div>
      </div>
      <div class="tl-sub">
        <div class="tl-sub-label">${act?'現在のサブピリオド一覧':'サブピリオド一覧'}</div>
        ${buildSubGrid(subs,act?now:null)}
      </div>`;
    item.querySelector('.tl-header').addEventListener('click',()=>{
      const isOpen=item.classList.contains('open');
      document.querySelectorAll('.tl-item').forEach(el=>{
        el.classList.remove('open');el.querySelector('.tl-chev').textContent='▼';
      });
      if(!isOpen){item.classList.add('open');item.querySelector('.tl-chev').textContent='▲';}
    });
    tl.appendChild(item);
  });
}

function searchDate(){
  const v=document.getElementById('search-date').value;
  const el=document.getElementById('search-result');
  if(!v){el.style.display='none';return}
  const target=new Date(v+'T00:00:00');
  const mi=allPeriods.findIndex(p=>target>=p.start&&target<p.end);
  if(mi<0){el.style.display='block';el.innerHTML='<span style="color:#c97a7a">この日付はサイクルの範囲外です</span>';return}
  const major=allPeriods[mi],mc=COLORS[major.key];
  const subs=buildSubs(major);
  const si=subs.findIndex(s=>target>=s.start&&target<s.end);
  const ageS=ageAt(birthDate,major.start),ageE=ageAt(birthDate,major.end);
  let html=`<div class="sr-row"><span class="sr-prefix">メジャー：</span><b style="color:${mc}">${PC[major.key].name}期</b><span style="color:var(--text-mid)">${fmt(major.start)} – ${fmt(major.end)}</span><span style="color:var(--text-dim);font-size:.72rem">${ageS}歳〜${ageE}歳</span></div>`;
  if(si>=0){
    const sc=COLORS[subs[si].key];
    html+=`<div class="sr-row" style="margin-top:3px"><span class="sr-prefix">サブ：</span><b style="color:${sc}">${PC[subs[si].key].name}期</b><span style="color:var(--text-mid)">${fmt(subs[si].start)} – ${fmt(subs[si].end)}</span></div>`;
  }
  el.style.display='block';el.innerHTML=html;
  const isCurrent=mi===currentMajIdx;
  document.querySelectorAll('.tl-item').forEach(el=>{
    const idx=parseInt(el.dataset.idx);
    if(idx===mi){
      el.classList.add('open');el.querySelector('.tl-chev').textContent='▲';
      el.querySelector('.tl-sub').innerHTML=`<div class="tl-sub-label">${isCurrent?'現在のサブピリオド一覧':'サブピリオド一覧'}</div>`+buildSubGrid(subs,target);
      el.scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      el.classList.remove('open');el.querySelector('.tl-chev').textContent='▼';
    }
  });
}

function reset(){
  document.getElementById('input-screen').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('search-result').style.display='none';
}
document.getElementById('bdate').value=new Date().toISOString().slice(0,10);
</script>
</body>
</html>
